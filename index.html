<!DOCTYPE html>
<html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>آبمیوه سلامت | منوی دیجیتال</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{font-family:Vazirmatn,sans-serif;background:#f6f7f3;margin:0;color:#222;max-width:540px;padding:16px;margin:auto}
.hero{background:#fff;border-radius:22px;padding:20px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.hero img{width:110px;height:110px;border-radius:50%;border:4px solid #d4af37}
h1{margin:10px 0;color:#1f6f50}.sub{color:#666}
#search{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin:18px 0}
.size{display:flex;gap:8px;flex-wrap:wrap}.size button{flex:1;padding:10px;border:none;border-radius:20px;background:#fff}.active{background:#1f6f50!important;color:#fff}
.card{display:flex;justify-content:space-between;align-items:center;background:#fff;margin:12px 0;padding:14px;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.price{color:#1f6f50;font-weight:700}
.sec{margin-top:20px;color:#1f6f50;font-weight:700}
.footer{display:flex;justify-content:space-around;background:#fff;padding:16px;border-radius:18px;margin:24px 0}
</style></head><body>
<div class="hero"><img src="logo.png.jpg"><h1>آبمیوه سلامت</h1><div class="sub">تازه • طبیعی • خوشمزه</div></div>
<input id="search" placeholder="🔍 جستجوی محصول">
<div class="size">
<button class="active" onclick="setSize('لیوانی',this)">🥤 لیوانی</button>
<button onclick="setSize('نیم‌لیتری',this)">🧃 نیم لیتری</button>
<button onclick="setSize('یک‌لیتری',this)">🍶 یک لیتری</button>
<button onclick="setSize('یک‌ونیم‌لیتری',this)">🫙 ۱.۵ لیتری</button>
</div>
<div id="menu"></div>
<div class="footer"><div>📍 یوسف‌آباد</div><div><a href="tel:09120230285">📞 تماس</a></div><div>🕘 ۹ تا ۲۳</div></div>
<script>
let all=[],size='لیوانی';
Papa.parse('menu.csv',{download:true,header:true,complete:r=>{all=r.data;draw();}});
function setSize(s,b){size=s;document.querySelectorAll('.size button').forEach(x=>x.classList.remove('active'));b.classList.add('active');draw();}
document.getElementById('search').oninput=draw;
function draw(){
 let q=document.getElementById('search').value.trim();
 let h='';
 all.forEach(i=>{
 let n=i['نام محصول']; if(!n)return;
 if(['منو ویژه فصلی','ترش‌های سلامت','طبیعی‌های سلامت','ترکیبی‌های سلامت','میلک شیک‌ها'].includes(n)){h+=`<div class='sec'>${n}</div>`;return;}
 if(q && !n.includes(q))return;
 let p=parseInt(i[size]); if(!p)return;
 if(size==='یک‌لیتری')p*=2; if(size==='یک‌ونیم‌لیتری')p*=3;
 h+=`<div class='card'><div><b>${n}</b><br><small>${i['توضیحات']||''}</small></div><div class='price'>${p.toLocaleString('fa-IR')} هزار تومان</div></div>`;
 });
 document.getElementById('menu').innerHTML=h;
}
</script></body></html>

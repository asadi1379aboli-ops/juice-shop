<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی آبمیوه فروشی</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b0b; color: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 500px; margin: auto; min-height: 100vh; }
        .gold { color: #d4af37; }
        .page { display: none; }
        .page.active { display: block; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #d4af37; margin-bottom: 20px; }
        .header h1 { font-size: 2.5rem; font-weight: bold; letter-spacing: 2px; }
        .header p { color: #aaa; margin-top: 5px; font-size: 1.1rem; }
        
        .size-selector { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .size-btn { flex: 1; background: #161616; border: 1px solid #333; color: #aaa; padding: 12px 0; border-radius: 30px; cursor: pointer; transition: 0.3s; text-align: center; font-weight: bold; }
        .size-btn.active { background: #d4af37; color: #000; border-color: #d4af37; }
        .size-btn:active { transform: scale(0.95); }

        .info-row { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .info-box { background: #161616; border-radius: 15px; padding: 15px; text-align: center; flex: 1; border: 1px solid #333; }
        .info-box span { color: #d4af37; font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .info-box p { font-size: 0.8rem; color: #ccc; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        .menu-item { display: flex; align-items: center; background: #161616; border-radius: 20px; padding: 12px; border: 1px solid #333; }
        .item-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #d4af37; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; margin-left: 15px; background: #0b0b0b; flex-shrink: 0; }
        .item-info { flex: 1; }
        .item-info h4 { font-size: 1.1rem; margin-bottom: 3px; color: #fff; }
        .item-info p { font-size: 0.8rem; color: #888; }
        .item-price { text-align: left; color: #d4af37; font-weight: bold; font-size: 1.1rem; }
        
        .section-header { text-align: right; padding: 15px 0 5px 0; font-size: 1.4rem; font-weight: bold; color: #ffcc00; border-bottom: 2px solid #ffcc00; margin: 20px 0 10px 0; display: flex; justify-content: space-between; }
        .loading { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>
    <div id="page-home" class="page active">
        <div class="header">
            <h1 class="gold">🍹 NATURE JUICE</h1>
            <p>تازگی را بنوشید</p>
        </div>
        <div class="size-selector">
            <div class="size-btn active" onclick="changeSize('لیوانی')">🥤 لیوانی</div>
            <div class="size-btn" onclick="changeSize('نیم‌لیتری')">🧃 نیم‌لیتری</div>
            <div class="size-btn" onclick="changeSize('یک‌لیتری')">🍶 یک‌لیتری</div>
            <div class="size-btn" onclick="changeSize('یک‌ونیم‌لیتری')">🫙 یک‌ونیم</div>
        </div>
        <div id="loading-msg" class="loading">در حال بارگذاری منو...</div>
        <div id="menu-list-container" class="menu-list"></div>
        <div class="info-row">
            <div class="info-box"><span>📍</span><p>آدرس ما</p></div>
            <div class="info-box"><span>📞</span><p>تماس با ما</p></div>
            <div class="info-box"><span>🕐</span><p>ساعت کاری<br>۹ تا ۲۳</p></div>
        </div>
    </div>

    <script>
        // ⭐️ مهمترین خط: اینجا داره فایل رو از کنار خودش می‌خونه
        const CSV_FILE_URL = "menu.csv";

        let allData = [];
        let currentSize = "لیوانی";

        function loadMenu() {
            document.getElementById('loading-msg').style.display = 'block';
            Papa.parse(CSV_FILE_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data.filter(row => row["نام محصول"] && row["نام محصول"].trim() !== "");
                    document.getElementById('loading-msg').style.display = 'none';
                    renderMenu();
                },
                error: function() {
                    document.getElementById('loading-msg').innerHTML = "خطا در لود منو. فایل CSV کنار فایل HTML نیست.";
                }
            });
        }

        function renderItem(item) {
            if (item["نام محصول"] === "منو ویژه فصلی") return `<div class="section-header"><span>🍉 منو ویژه فصلی</span></div>`;
            else if (item["نام محصول"] === "ترش‌های سلامت") return `<div class="section-header"><span>🥬 ترش‌های سلامت</span></div>`;
            else if (item["نام محصول"] === "طبیعی‌های سلامت") return `<div class="section-header"><span>🥗 طبیعی‌های سلامت</span></div>`;
            else if (item["نام محصول"] === "ترکیبی‌های سلامت") return `<div class="section-header"><span>🍓 ترکیبی‌های سلامت</span></div>`;
            else if (item["نام محصول"] === "میلک شیک‌ها") return `<div class="section-header"><span>🥛 میلک شیک‌ها</span></div>`;
            
            let basePrice = parseInt(item["قیمت لیوانی"]);
            if (isNaN(basePrice)) return "";

            let finalPrice = basePrice;
            if (currentSize === "نیم‌لیتری") finalPrice = basePrice;
            else if (currentSize === "یک‌لیتری") finalPrice = basePrice * 2;
            else if (currentSize === "یک‌ونیم‌لیتری") finalPrice = basePrice * 3;

            return `
                <div class="menu-item">
                    <div class="item-img">🍎</div>
                    <div class="item-info">
                        <h4>${item["نام محصول"]}</h4>
                        <p>${item["توضیحات"] || ""}</p>
                    </div>
                    <div class="item-price">${finalPrice}t</div>
                </div>
            `;
        }

        function renderMenu() {
            const container = document.getElementById('menu-list-container');
            const itemsHtml = allData.map(renderItem).filter(html => html !== "").join('');
            container.innerHTML = itemsHtml;
        }

        function changeSize(sizeKey) {
            currentSize = sizeKey;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(sizeKey)) btn.classList.add('active');
            });
            renderMenu();
        }

        loadMenu();
    </script>
</body>
</html>
